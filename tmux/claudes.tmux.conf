# Optional tmux tweaks for a nicer claudes experience.
# Either append this to ~/.tmux.conf, or source it from there:
#   source-file ~/path/to/claudes/tmux/claudes.tmux.conf

# Mouse on: click to focus panes, scroll with the trackpad
set -g mouse on

# Show a label above each pane with its current working directory
set -g pane-border-status top
set -g pane-border-format " #{pane_current_path} "

# Bigger scrollback
set -g history-limit 50000

# Start window/pane numbering at 1 (easier to hit)
set -g base-index 1
setw -g pane-base-index 1

# Use vim-style pane navigation (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Easy split with memorable keys (prefix + | and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Quick reload of this config (prefix + r)
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
